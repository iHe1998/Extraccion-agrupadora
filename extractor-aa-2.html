<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extractor AA · Andreani</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f4f4f4;
    color: #222;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: #d71920;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(255,102,0,0.25);
  }

  .logo-box {
    background: #fff;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 18px;
    font-weight: 900;
    color: #d71920;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header-title {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    opacity: 0.95;
  }

  .header-sub {
    color: rgba(255,255,255,0.75);
    font-size: 11px;
    margin-top: 2px;
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 28px 16px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    padding: 28px 24px;
    width: 100%;
    max-width: 540px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    border-top: 4px solid #d71920;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: #d71920;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 16px;
    background: #d71920;
    border-radius: 2px;
  }

  .label {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 7px;
  }

  textarea {
    width: 100%;
    background: #fafafa;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    color: #444;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 12px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  textarea:focus { border-color: #d71920; }
  textarea::placeholder { color: #bbb; }

  .btn-row {
    margin-top: 12px;
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    background: #d71920;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn:hover { background: #b01018; }
  .btn:active { transform: scale(0.98); }

  .btn-cam {
    flex: 0 0 auto;
    padding: "12px 16px";
    background: #fff;
    border: 2px solid #d71920;
    color: #d71920;
    border-radius: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
  }
  .btn-cam:hover { background: #fff5ef; }
  .btn-cam:active { transform: scale(0.98); }

  .divider {
    margin: 22px 0;
    border: none;
    border-top: 1.5px solid #f0f0f0;
  }

  /* Resultado */
  .result-box {
    background: #fafafa;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 14px 16px;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .result-box.found { border-color: #4caf50; background: #f6fff6; }
  .result-box.error { border-color: #f44336; background: #fff6f6; }

  .result-value {
    font-size: 20px;
    font-weight: 800;
    color: #2e7d32;
    word-break: break-all;
    flex: 1;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.03em;
  }
  .result-value.placeholder { font-size: 13px; color: #bbb; font-weight: 400; font-family: 'Segoe UI', Arial, sans-serif; }
  .result-value.error-msg { color: #c62828; font-size: 13px; font-weight: 500; font-family: 'Segoe UI', Arial, sans-serif; }

  .copy-btn {
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 6px;
    color: #888;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: #d71920; color: #d71920; }
  .copy-btn.copied { border-color: #4caf50; color: #4caf50; background: #f6fff6; }

  .multiple-results {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 8px 12px;
  }
  .row-index {
    font-size: 11px;
    font-weight: 700;
    color: #d71920;
    width: 20px;
    flex-shrink: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  .row-value {
    font-size: 14px;
    color: #2e7d32;
    font-weight: 700;
    flex: 1;
    word-break: break-all;
    font-family: 'Courier New', monospace;
  }
  .row-copy {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    color: #888;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .row-copy:hover { border-color: #d71920; color: #d71920; }
  .row-copy.copied { border-color: #4caf50; color: #4caf50; }

  /* Copiar todo */
  .copy-all-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 14px; margin-bottom: 6px; display: none; }
  .copy-all-bar {
    display: none;
    background: #fff5f5;
    border: 1.5px solid #d71920;
    border-radius: 8px;
    padding: 10px 14px;
    align-items: center;
    gap: 10px;
  }
  .copy-all-bar.visible { display: flex; }
  .copy-all-val { flex: 1; font-size: 13px; color: #d71920; word-break: break-all; font-family: 'Courier New', monospace; font-weight: 700; }
  .copy-all-btn {
    background: #d71920;
    border: none;
    border-radius: 6px;
    color: #fff;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .copy-all-btn:hover { background: #b01018; }
  .copy-all-btn.copied { background: #4caf50; }

  /* Modal cámara */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 92%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border-top: 4px solid #d71920;
  }

  .modal-title {
    font-size: 14px;
    font-weight: 700;
    color: #d71920;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #qr-video {
    width: 100%;
    border-radius: 8px;
    border: 1.5px solid #e0e0e0;
    background: #000;
    aspect-ratio: 1;
    object-fit: cover;
  }

  .scan-status {
    font-size: 13px;
    color: #888;
    text-align: center;
    min-height: 18px;
    font-weight: 500;
  }
  .scan-status.ok { color: #4caf50; }
  .scan-status.err { color: #f44336; }

  .btn-cerrar {
    padding: 10px;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    color: #888;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cerrar:hover { border-color: #f44336; color: #f44336; }

  /* Footer */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: #bbb;
  }
  footer span { color: #d71920; font-weight: 700; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <img src="logo.png" height="36" style="background:white;padding:4px 10px;border-radius:5px">
  <div>
    <div class="header-title">Extractor de Código Agrupadora</div>
    <div class="header-sub">Operaciones · Farmacéutica</div>
  </div>
</header>

<!-- Modal cámara -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d71920" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Escanear código
    </div>
    <div style="position:relative;border-radius:8px;overflow:hidden;background:#000;aspect-ratio:1">
      <video id="qr-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;display:block"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="width:175px;height:175px;border:2.5px solid #d71920;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.35)"></div>
      </div>
    </div>
    <canvas id="qr-canvas" style="display:none"></canvas>
    <div class="scan-status" id="scanStatus">Apuntá la cámara al código...</div>
    <button class="btn-cerrar" onclick="cerrarCamara()">Cerrar cámara</button>
  </div>
</div>

<!-- Main -->
<main>
  <div class="card">
    <div class="section-title">Código Agrupadora</div>

    <div class="label">Pegá el código SCE</div>
    <textarea id="input" placeholder="&lt;AA&gt;2025225955487624078&lt;AA&gt;&lt;GT&gt;5000456070935&lt;GT&gt;...&#10;Podés pegar múltiples líneas o escanear con la cámara"></textarea>

    <div class="btn-row">
      <button class="btn" onclick="extraer()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Extraer
      </button>
      <button class="btn-cam" onclick="abrirCamara()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#d71920" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Cámara
      </button>
    </div>

    <hr class="divider">

    <div class="label">Resultado</div>
    <div class="result-box" id="resultBox">
      <span class="result-value placeholder" id="resultVal">El número aparecerá aquí</span>
    </div>

    <div class="copy-all-label" id="copyAllLabel">Copiar todo junto</div>
    <div class="copy-all-bar" id="copyAllBar">
      <span class="copy-all-val" id="copyAllVal"></span>
      <button class="copy-all-btn" id="copyAllBtn" onclick="copiarTodo()">Copiar todo</button>
    </div>
  </div>
</main>

<footer>Herramienta interna · <span>Andreani</span> Operaciones Farmacéutica</footer>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>

let allValues = [];

function extraer(extraInput) {
  const raw = extraInput !== undefined ? extraInput : document.getElementById('input').value.trim();
  const box = document.getElementById('resultBox');
  const resultVal = document.getElementById('resultVal');
  const copyAllBar = document.getElementById('copyAllBar');
  const copyAllLabel = document.getElementById('copyAllLabel');

  box.className = 'result-box';
  copyAllBar.className = 'copy-all-bar';
  copyAllLabel.style.display = 'none';
  allValues = [];

  if (!raw) {
    box.className = 'result-box error';
    resultVal.className = 'result-value error-msg';
    resultVal.innerHTML = 'Pegá un código primero.';
    return;
  }

  const matches = [...raw.matchAll(/<AA>([^<]+)<AA>/gi)];

  if (matches.length === 0) {
    box.className = 'result-box error';
    resultVal.className = 'result-value error-msg';
    resultVal.innerHTML = 'No se encontró ningún valor &lt;AA&gt;.';
    return;
  }

  allValues = matches.map(m => m[1].trim());
  box.className = 'result-box found';

  if (allValues.length === 1) {
    const val = allValues[0];
    resultVal.className = 'result-value';
    resultVal.innerHTML = `${val} <button class="copy-btn" id="mainCopy" onclick="copiar('${val}', 'mainCopy')">Copiar</button>`;
  } else {
    resultVal.className = '';
    let html = '<div class="multiple-results">';
    allValues.forEach((val, i) => {
      html += `<div class="result-row">
        <span class="row-index">${i+1}</span>
        <span class="row-value">${val}</span>
        <button class="row-copy" id="rc${i}" onclick="copiar('${val}','rc${i}')">Copiar</button>
      </div>`;
    });
    html += '</div>';
    resultVal.innerHTML = html;

    const joined = allValues.join(' O ');
    document.getElementById('copyAllVal').textContent = joined;
    copyAllBar.className = 'copy-all-bar visible';
    copyAllLabel.style.display = 'block';
  }
}

function copiar(val, btnId) {
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById(btnId);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    }
  });
}

function copiarTodo() {
  const joined = allValues.join(' O ');
  navigator.clipboard.writeText(joined).then(() => {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar todo'; btn.classList.remove('copied'); }, 1800);
  });
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); extraer(); }
});

// ── Cámara ──
let stream = null;
let scanInterval = null;
let scannedCodes = new Set();

async function abrirCamara() {
  const overlay = document.getElementById('modalOverlay');
  const video = document.getElementById('qr-video');
  const status = document.getElementById('scanStatus');

  status.className = 'scan-status';
  status.textContent = 'Iniciando cámara...';
  overlay.classList.add('active');
  scannedCodes.clear();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    status.textContent = 'Apuntá la cámara al código...';
    iniciarScan();
  } catch(e) {
    status.className = 'scan-status err';
    status.textContent = 'Error: ' + (e.message || 'Permiso denegado');
  }
}

function iniciarScan() {
  const video = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');
  const status = document.getElementById('scanStatus');

  scanInterval = setInterval(() => {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });

    if (code && code.data && !scannedCodes.has(code.data)) {
      scannedCodes.add(code.data);
      video.style.outline = '3px solid #d71920';
      setTimeout(() => { video.style.outline = 'none'; }, 400);
      status.className = 'scan-status ok';
      status.textContent = '✓ Escaneado — seguí escaneando o cerrá';
      const ta = document.getElementById('input');
      ta.value = ta.value ? ta.value + '\n' + code.data : code.data;
      extraer(ta.value.trim());
    }
  }, 200);
}

function cerrarCamara() {
  clearInterval(scanInterval);
  scanInterval = null;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  scannedCodes.clear();
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('qr-video').srcObject = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarCamara(); });
</script>
</body>
</html>
